<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Full Body VRM LipSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #333;
        }

        canvas {
            display: block;
        }

        #video {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 160px;
            transform: scaleX(-1);
            border: 2px solid #777;
            border-radius: 8px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div id="loading">VRMモデルとAIを読み込み中...</div>
    <video id="video" autoplay playsinline></video>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';
        import GUI from 'lil-gui';

        // --- 設定 ---
        const vrmUrl = 'Black01.vrm';

        let currentVrm;
        let faceLandmarker;
        let video;
        const clock = new THREE.Clock();

        // UI用パラメータ (初期状態で全身が見えるように調整)
        const settings = {
            posX: 0,
            posY: 0,
            posZ: 0,
            scale: 1.0,
            rotateY: Math.PI
        };

        // --- Three.js セットアップ ---
        const scene = new THREE.Scene();

        // 全身を映すためにカメラ位置を調整 (高さ1.0m、距離3.2m程度)
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 0.9, 3.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 照明
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(1, 2, 3);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // 床（位置関係をわかりやすくするため）
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
        scene.add(gridHelper);

        // --- UI設定 ---
        const gui = new GUI({ title: 'VRM Controller' });
        gui.add(settings, 'posX', -2, 2).onChange(updateTransform);
        gui.add(settings, 'posY', -2, 2).onChange(updateTransform);
        gui.add(settings, 'posZ', -2, 2).onChange(updateTransform);
        gui.add(settings, 'scale', 0.1, 2).onChange(updateTransform);
        gui.add(settings, 'rotateY', -Math.PI, Math.PI).name('Rotation').onChange(updateTransform);

        function updateTransform() {
            if (currentVrm) {
                currentVrm.scene.position.set(settings.posX, settings.posY, settings.posZ);
                currentVrm.scene.scale.setScalar(settings.scale);
                currentVrm.scene.rotation.y = settings.rotateY;
            }
        }

        // --- 直立姿勢（Aポーズ）を適用する関数 ---
        function applyStandingPose(vrm) {
            const humanoid = vrm.humanoid;
            if (humanoid) {
                // 両腕を下ろす (Z軸の回転で調整)
                const leftUpperArm = humanoid.getRawBoneNode('leftUpperArm');
                const rightUpperArm = humanoid.getRawBoneNode('rightUpperArm');

                if (leftUpperArm) leftUpperArm.rotation.z = Math.PI / 2.5; // 約72度
                if (rightUpperArm) rightUpperArm.rotation.z = -Math.PI / 2.5;

                // 少し脇を締める
                const leftShoulder = humanoid.getRawBoneNode('leftShoulder');
                const rightShoulder = humanoid.getRawBoneNode('rightShoulder');
                if (leftShoulder) leftShoulder.rotation.z = 0.2;
                if (rightShoulder) rightShoulder.rotation.z = -0.2;
            }
        }


        // --- 直立姿勢 (A-Pose) の適用関数 ---
        function applyStraightPose() {
            if (!currentVrm) return;
            const humanoid = currentVrm.humanoid;

            // 【修正】getNormalizedBoneNode を使用
            // これにより、モデルごとの初期姿勢の違いを吸収してポーズを適用できます
            const leftUpperArm = humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = humanoid.getNormalizedBoneNode('rightUpperArm');

            if (leftUpperArm) {
                // Tポーズ(0)から腕を下ろす方向に回転
                leftUpperArm.rotation.z = 1.3;
            }
            if (rightUpperArm) {
                rightUpperArm.rotation.z = -1.3;
            }
        }

        // --- MediaPipe セットアップ ---
        async function setupFaceTracking() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });

            video = document.getElementById("video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => predictWebcam());
        }

        // --- VRM 読み込み ---
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.load(
            vrmUrl,
            (gltf) => {
                const vrm = gltf.userData.vrm;
                currentVrm = vrm;
                scene.add(vrm.scene);

                // 1. 正面を向かせる
                VRMUtils.rotateVRM0(vrm);

                // 2. 直立姿勢（Aポーズ）を適用
                applyStraightPose();

                updateTransform();
                document.getElementById('loading').style.display = 'none';
            }
        );

        // --- 推論・更新ループ ---
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                if (faceLandmarker) {
                    const result = faceLandmarker.detectForVideo(video, performance.now());
                    if (result.faceBlendshapes && result.faceBlendshapes.length > 0) {
                        applyFaceResults(result.faceBlendshapes[0]);
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function applyFaceResults(blendshapes) {
            if (!currentVrm) return;
            const categories = {};
            blendshapes.categories.forEach(c => { categories[c.categoryName] = c.score; });

            const em = currentVrm.expressionManager;
            // リップシンク
            em.setValue('aa', categories['jawOpen'] > 0.1 ? categories['jawOpen'] * 1.3 : 0);
            // まばたき
            em.setValue('blinkLeft', categories['eyeBlinkLeft']);
            em.setValue('blinkRight', categories['eyeBlinkRight']);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                // 毎フレームポーズを更新して「直立」を維持する
                applyStraightPose();

                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setupFaceTracking();
        animate();
    </script>
</body>

</html>
