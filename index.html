<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Modern VRM LipSync (MediaPipe)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        canvas { display: block; }
        #video { position: absolute; bottom: 10px; right: 10px; width: 200px; transform: scaleX(-1); border: 2px solid white; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">Loading AI Models and VRM...</div>
    <video id="video" autoplay playsinline></video>

    <!-- Import Maps for Modern JS -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        // --- 設定 ---
        const vrmUrl = 'Black01.vrm';

        let currentVrm;
        let faceLandmarker;
        let video;
        const clock = new THREE.Clock();

        // --- Three.js セットアップ ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 1.0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, Math.PI);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- MediaPipe Face Landmarker 初期化 ---
        async function setupFaceTracking() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });
            
            video = document.getElementById("video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
        }

        // --- VRM モデル読み込み ---
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.load(
            vrmUrl,
            (gltf) => {
                const vrm = gltf.userData.vrm;
                currentVrm = vrm;
                scene.add(vrm.scene);
                VRMUtils.rotateVRM0(vrm); // VRM0.0の場合の補正
                document.getElementById('loading').style.display = 'none';
                console.log("VRM Loaded");
            }
        );

        // --- メインループ ---
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                if (faceLandmarker) {
                    const result = faceLandmarker.detectForVideo(video, performance.now());
                    if (result.faceBlendshapes && result.faceBlendshapes.length > 0) {
                        applyFaceResults(result.faceBlendshapes[0]);
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        // --- 顔の動きをVRMに適用 ---
        function applyFaceResults(blendshapes) {
            if (!currentVrm) return;

            const categories = {};
            blendshapes.categories.forEach(c => {
                categories[c.categoryName] = c.score;
            });

            const expressionManager = currentVrm.expressionManager;

            // リップシンク (MediaPipeの顎の開きをVRMの'aa'にマッピング)
            // jawOpen, mouthFunnel, mouthPucker 等を組み合わせて精度を上げられます
            expressionManager.setValue('aa', categories['jawOpen'] * 1.2);
            expressionManager.setValue('ih', categories['mouthSmileLeft'] * 0.5); // 少し口角を上げる

            // まばたき
            expressionManager.setValue('blinkLeft', categories['eyeBlinkLeft']);
            expressionManager.setValue('blinkRight', categories['eyeBlinkRight']);

            // 首の回転 (簡易実装: 目などの位置から計算も可能ですが、ここでは省略)
            // 本格的には result.faceLandmarks から回転行列を計算します
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setupFaceTracking();
        animate();
    </script>
</body>
</html>
