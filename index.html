<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Full Body VRM LipSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #333;
        }

        canvas {
            display: block;
        }

        #video {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 160px;
            transform: scaleX(-1);
            border: 2px solid #777;
            border-radius: 8px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 1.2rem;
        }

        .controls-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            /* 少し濃くして視認性アップ */
            color: white;
            padding: 0;
            /* ヘッダーと中身を分けるため0に */
            border-radius: 8px;
            font-family: sans-serif;
            z-index: 100;
            width: 180px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .controls-header {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .controls-header h3 {
            margin: 0;
            font-size: 14px;
        }

        .controls-overlay h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        /* 閉じた時の状態 */
        .controls-overlay.collapsed .controls-content {
            display: none;
        }

        .controls-content {
            padding: 10px;
            font-size: 12px;
        }

        .controls-group {
            margin-bottom: 10px;
        }

        .controls-group label {
            display: block;
            margin-bottom: 2px;
        }

        select,
        input[type="file"] {
            width: 100%;
            font-size: 12px;
            margin-top: 2px;
        }

        /* 折りたたみアイコン */
        #toggleIcon {
            font-style: normal;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="loading">VRMモデルとAIを読み込み中...</div>
    <video id="video" autoplay playsinline></video>


    <div class="controls-overlay" id="controlsOverlay">
        <div class="controls-header" id="toggleHeader">
            <h3>Settings</h3>
            <span id="toggleIcon">−</span>
        </div>
        <div class="controls-content">
            <div class="controls-group">
                <label>VRM model</label><input type="file" id="fileInput" accept=".vrm">
            </div>
            <div class="controls-group">
                <label>Background</label>
                <select id="bgSelect">
                    <option value="">(None)</option>
                    <option value="img/cyber_bg.png">Cyber
                    </option>
                    <option value="img/home_bg.png">home
                    </option>
                    <option value="img/wa_bg.png">Wa
                    </option>
                </select>
                <input type="file" id="bgFile" accept="image/*">
            </div>
            <div class="controls-group">
                <label>Floor</label>
                <select id="floorSelect">
                    <option value="">(None)</option>
                    <option value="img/cyber_fl.png">Cyber
                    </option>
                    <option value="img/home_fl.png">home
                    </option>
                    <option value="img/wa_fl.png">Wa
                    </option>
                </select>
                <input type="file" id="floorFile" accept="image/*">
            </div>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';
        import GUI from 'lil-gui';

        // --- 設定 ---
        const vrmUrl = 'https://github.com/madjin/vrm-samples/raw/refs/heads/master/vroid/fem_vroid.vrm';


        let currentVrm;
        let faceLandmarker;
        let floorMesh; // 床オブジェクトを保持する変数
        let video;
        const clock = new THREE.Clock();
        const fileInput = document.getElementById('fileInput');
        const textureLoader = new THREE.TextureLoader();

        // UI用パラメータ (初期状態で全身が見えるように調整)
        const settings = {
            posX: 0,
            posY: 0,
            posZ: 0,
            scale: 1.0,
            rotateY: Math.PI
        };

        // VRMを読み込む共通関数
        async function loadVRM(url) {
            // 既存のモデルがある場合は削除
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                // メモリ解放（必要に応じて）
                // VRMUtils.deepDispose(currentVrm.scene);
            }

            setupEnvironment(scene); // 背景・床をセットアップ

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            const gltf = await loader.loadAsync(url);
            const vrm = gltf.userData.vrm;

            // シーンに追加
            scene.add(vrm.scene);
            currentVrm = vrm;

            // モデルの向きを調整（既存コードに合わせる）
            VRMUtils.rotateVRM0(currentVrm);
            console.log("VRM Loaded:", vrm);

            document.getElementById('loading').style.display = 'none';
        }

        // VRMファイルが選択された時の処理
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const blob = new Blob([file], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);

            loadVRM(url);
        });

        // --- シーンセットアップ関数内に床を追加 ---
        // (既存の init 関数またはシーン作成箇所を想定)
        function setupEnvironment(scene) {
            // 床の作成
            const geometry = new THREE.PlaneGeometry(20, 20);
            const material = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
            floorMesh = new THREE.Mesh(geometry, material);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.y = 0; // VRMの足元に合わせる
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            // 背景の初期設定（任意）
            // scene.background = new THREE.Color(0xcccccc);
        }

        // --- 画像読み込み処理 ---
        function updateBackground(url) {
            if (!url) {
                scene.background = new THREE.Color(0xcccccc);
                return;
            }
            textureLoader.load(url, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                scene.background = texture;
            });
        }

        function updateFloor(url) {
            if (!url) {
                floorMesh.material.map = null;
                floorMesh.material.needsUpdate = true;
                return;
            }
            textureLoader.load(url, (texture) => {
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4); // 床のタイルリピート設定
                texture.colorSpace = THREE.SRGBColorSpace;
                floorMesh.material.map = texture;
                floorMesh.material.needsUpdate = true;
            });
        }

        // --- イベントリスナーの登録 ---
        document.getElementById('bgSelect').addEventListener('change', (e) => updateBackground(e.target.value));
        document.getElementById('floorSelect').addEventListener('change', (e) => updateFloor(e.target.value));

        document.getElementById('bgFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) updateBackground(URL.createObjectURL(file));
        });
        document.getElementById('floorFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) updateFloor(URL.createObjectURL(file));
        });


        const overlay = document.getElementById('controlsOverlay');
        const toggleHeader = document.getElementById('toggleHeader');
        const toggleIcon = document.getElementById('toggleIcon');

        toggleHeader.addEventListener('click', () => {
            overlay.classList.toggle('collapsed');
            // アイコンを「＋」と「－」で切り替え
            toggleIcon.textContent = overlay.classList.contains('collapsed') ? '＋' : '－';
        });

        // --- Three.js セットアップ ---
        const scene = new THREE.Scene();

        // 全身を映すためにカメラ位置を調整 (高さ1.0m、距離3.2m程度)
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 0.9, 3.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 照明
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(1, 2, 3);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // 床（位置関係をわかりやすくするため）
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
        scene.add(gridHelper);

        // --- UI設定 ---
        const gui = new GUI({ title: 'VRM Controller' });
        gui.add(settings, 'posX', -2, 2).onChange(updateTransform);
        gui.add(settings, 'posY', -2, 2).onChange(updateTransform);
        gui.add(settings, 'posZ', -2, 2).onChange(updateTransform);
        gui.add(settings, 'scale', 0.1, 2).onChange(updateTransform);
        gui.add(settings, 'rotateY', -Math.PI, Math.PI).name('Rotation').onChange(updateTransform);

        function updateTransform() {
            if (currentVrm) {
                currentVrm.scene.position.set(settings.posX, settings.posY, settings.posZ);
                currentVrm.scene.scale.setScalar(settings.scale);
                currentVrm.scene.rotation.y = settings.rotateY;
            }
        }


        // --- 直立姿勢 (A-Pose) の適用関数 ---
        function applyStraightPose() {
            if (!currentVrm) return;
            const humanoid = currentVrm.humanoid;

            // 【修正】getNormalizedBoneNode を使用
            // これにより、モデルごとの初期姿勢の違いを吸収してポーズを適用できます
            const leftUpperArm = humanoid.getNormalizedBoneNode('leftUpperArm');
            const rightUpperArm = humanoid.getNormalizedBoneNode('rightUpperArm');

            if (leftUpperArm) {
                // Tポーズ(0)から腕を下ろす方向に回転
                leftUpperArm.rotation.z = 1.3;
            }
            if (rightUpperArm) {
                rightUpperArm.rotation.z = -1.3;
            }
        }

        // --- MediaPipe セットアップ ---
        async function setupFaceTracking() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });

            video = document.getElementById("video");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => predictWebcam());
        }

        // --- VRM 読み込み ---
        loadVRM(vrmUrl);

        // --- 推論・更新ループ ---
        let lastVideoTime = -1;
        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                if (faceLandmarker) {
                    const result = faceLandmarker.detectForVideo(video, performance.now());
                    if (result.faceBlendshapes && result.faceBlendshapes.length > 0) {
                        applyFaceResults(result.faceBlendshapes[0]);
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }


        // 母音判別
        function applyFaceResults(blendshapes) {
            if (!currentVrm) return;

            // MediaPipeのスコアを扱いやすいようにオブジェクトに変換
            const s = {};
            blendshapes.categories.forEach(c => { s[c.categoryName] = c.score; });

            const em = currentVrm.expressionManager;

            // --- 1. 特徴量の抽出 ---
            const open = s['jawOpen'];                                          // 顎の開き
            const funnel = s['mouthFunnel'];                                    // 口を丸くする（オ）
            const pucker = s['mouthPucker'];                                    // 口を窄める（ウ）
            const smile = (s['mouthSmileLeft'] + s['mouthSmileRight']) / 2;      // 口角の上がり
            const stretch = (s['mouthStretchLeft'] + s['mouthStretchRight']) / 2; // 口の横引き

            // --- 2. 母音判定ロジック (Heuristics) ---

            // 【あ】顎が開いていて、かつ口を丸めたり窄めたりしていない
            const aa = Math.max(0, open - funnel - pucker);

            // 【い】顎の開きは抑えめで、口角が上がっている、または横に引いている
            const ih = Math.max(0, (smile + stretch) * 0.8 - open * 0.3);

            // 【う】口を強く窄めている状態
            const uu = Math.max(0, pucker * 1.5);

            // 【え】顎が開き、かつ横にも引いている（「あ」と「い」の中間）
            const ee = Math.max(0, (open * 0.6 + stretch * 0.4) - funnel);

            // 【お】顎が開き、かつ口が丸まっている状態
            const oh = Math.max(0, funnel * 1.2);

            // --- 3. VRM Expression への適用 ---
            em.setValue('aa', aa * 1.2);
            em.setValue('ih', ih * 1.0);
            em.setValue('uu', uu * 1.0);
            em.setValue('ee', ee * 1.0);
            em.setValue('oh', oh * 1.0);

            // まばたき（前回同様）
            em.setValue('blinkLeft', s['eyeBlinkLeft']);
            em.setValue('blinkRight', s['eyeBlinkRight']);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                // 毎フレームポーズを更新して「直立」を維持する
                applyStraightPose();

                currentVrm.update(delta);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setupFaceTracking();
        animate();
    </script>
</body>

</html>
